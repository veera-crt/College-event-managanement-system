<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/auth-check.js"></script>
    <script>AuthGuard.requireAuth(['student']);</script>
    <title>Student Profile - CampusHub</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#ef4444',
                        background: '#f8fafc',
                        foreground: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b]">
    <div class="grid min-h-screen grid-cols-[280px_1fr]">
        <!-- Sidebar -->
        <aside class="flex flex-col border-r border-[#e2e8f0] bg-white p-8">
            <div class="mb-12 flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-white font-black text-xl italic shadow-lg shadow-blue-200">A</div>
                <span class="text-xl font-black tracking-tighter text-primary">STUDENT HUB</span>
            </div>

            <nav class="flex-1 space-y-2">
                <a href="student.html" class="flex w-full items-center gap-4 rounded-xl px-5 py-4 text-sm font-bold transition-all border-l-4 border-transparent hover:bg-gray-50 text-gray-500 hover:text-primary group">
                    <i data-lucide="layout-dashboard" class="h-5 w-5"></i> Dashboard
                </a>
                <a href="student-profile.html" class="flex w-full items-center gap-4 rounded-xl px-5 py-4 text-sm font-bold transition-all border-l-4 border-primary bg-blue-50 text-primary">
                    <i data-lucide="user" class="h-5 w-5"></i> My Profile
                </a>
            </nav>

            <div class="mt-auto pt-8 border-t border-gray-100">
                <button onclick="logout()" class="flex w-full items-center gap-4 px-5 py-3 text-sm font-bold text-red-500 hover:text-red-600 transition-colors">
                    <i data-lucide="log-out" class="h-5 w-5"></i> Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="p-10 overflow-y-auto">
            <header class="py-12 flex items-center justify-between">
                <div>
                    <h1 class="text-4xl font-black text-primary tracking-tight">Personal Profile</h1>
                    <p class="text-gray-500 font-bold uppercase tracking-widest text-xs mt-1">Manage your student identity</p>
                </div>
            </header>

            <div class="mx-auto max-w-2xl animate-in">
                <div class="bg-white rounded-[2rem] p-10 shadow-xl shadow-blue-900/5 border border-gray-50 overflow-hidden">
                    <div class="flex items-center gap-6 mb-10">
                        <div class="h-20 w-20 rounded-2xl bg-primary text-white flex items-center justify-center font-black text-3xl italic">S</div>
                        <div>
                            <h2 class="text-2xl font-black text-primary" id="profileNameDisplay">Student Name</h2>
                            <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px]" id="profileRole">Student</p>
                        </div>
                   </div>

                    <form id="studentProfileForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Full Name</label>
                                <input type="text" id="name" required class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Registration Number</label>
                                <input type="text" id="regNo" disabled class="w-full border-b border-gray-100 py-2 font-bold text-gray-400 outline-none bg-transparent">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Personal Email</label>
                                <input type="email" id="email" required disabled class="w-full border-b border-gray-100 py-2 font-bold text-gray-400 cursor-not-allowed outline-none bg-transparent">
                            </div>
                            <div class="space-y-2 relative">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">College Email</label>
                                <input type="email" id="collegeEmail" placeholder="ra123@college.edu" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                                
                                <!-- Inline OTP Verification (in the card) -->
                                <div id="inlineOtpGroup" class="hidden mt-4 p-5 bg-gradient-to-br from-blue-50 to-indigo-50/50 rounded-2xl border border-blue-100 shadow-lg shadow-blue-900/5 animate-in relative overflow-hidden">
                                     <div class="absolute top-0 right-0 p-3 opacity-5">
                                        <i data-lucide="shield-check" class="w-10 h-10 text-primary"></i>
                                    </div>
                                    
                                    <label class="text-[9px] font-black text-blue-600 uppercase tracking-[0.2em] mb-3 block">Verification Required</label>
                                    
                                    <div class="flex items-center gap-3">
                                        <div class="relative flex-1">
                                            <input type="text" id="inlineOtp" maxlength="6" placeholder="Code" class="w-full bg-white border border-blue-100 rounded-xl px-4 py-3 text-center font-black tracking-[0.2em] text-primary focus:border-primary outline-none text-lg transition-all placeholder:text-gray-200 placeholder:tracking-normal">
                                        </div>
                                        <button type="button" id="inlineVerifyBtn" class="bg-primary text-white h-[52px] px-6 rounded-xl font-bold text-xs hover:bg-black transition-all">
                                            Verify
                                        </button>
                                    </div>
                                    
                                    <div class="mt-3 flex items-center justify-between px-1">
                                        <button type="button" onclick="cancelEmailChange()" class="text-[9px] font-black text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors">
                                            Cancel Change
                                        </button>
                                        <span class="text-[9px] font-bold text-blue-300">Check inbox</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Phone Number</label>
                                <input type="tel" id="phone" placeholder="9876543210" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                            </div>
                             <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Gender Orientation</label>
                                <select id="gender" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all bg-transparent cursor-pointer">
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                             <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Department</label>
                                <input type="text" id="dept" placeholder="B.Tech CS" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Date of Birth</label>
                                <input type="date" id="dob" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                            </div>
                        </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Home Address</label>
                                <input type="text" id="address" placeholder="Address" class="w-full border-b border-gray-100 py-2 font-bold text-primary focus:border-primary outline-none transition-all">
                            </div>
                        </div>

                        <!-- Security Settings -->
                        <div class="mt-10 pt-8 border-t border-gray-100">
                            <h3 class="text-xl font-black text-primary mb-6">Security Settings</h3>
                            <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 space-y-6">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <p class="text-sm font-bold text-slate-800">Login Password</p>
                                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Change your password via OTP verification</p>
                                    </div>
                                    <button type="button" id="initPasswordChangeBtn" onclick="initiatePasswordChange()" class="px-5 py-2.5 bg-white border border-slate-200 text-slate-600 font-bold text-xs rounded-xl shadow-sm hover:bg-slate-100 transition-all">
                                        Change Password
                                    </button>
                                </div>
                                
                                <div id="passwordChangeForm" class="hidden pt-6 border-t border-slate-200">
                                    <div class="space-y-4">
                                        <div class="space-y-2">
                                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Verification Code (Sent to Primary Email)</label>
                                            <input type="text" id="pwdOtp" maxlength="6" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-center font-black tracking-[0.2em] text-primary focus:border-primary outline-none transition-all placeholder:text-gray-200 placeholder:tracking-normal">
                                        </div>
                                        <div class="space-y-2">
                                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">New Password</label>
                                            <input type="password" id="newPassword" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 font-bold text-primary focus:border-primary outline-none transition-all">
                                        </div>
                                        <div class="flex gap-3 pt-2">
                                            <button type="button" id="confirmPasswordChangeBtn" onclick="confirmPasswordChange()" class="flex-1 py-3 bg-red-50 text-red-600 hover:bg-red-500 hover:text-white rounded-xl font-black text-xs uppercase tracking-widest transition-all">
                                                Update Password
                                            </button>
                                            <button type="button" onclick="cancelPasswordChange()" class="px-5 py-3 bg-white text-slate-400 font-bold text-xs rounded-xl border border-slate-200 hover:bg-slate-50 transition-all">
                                                Cancel
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="w-full py-4 mt-6 bg-primary text-white rounded-xl font-bold text-base hover:bg-secondary transition-all shadow-lg shadow-blue-900/10 active:scale-[0.98]">
                            Save Profile Changes
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const form = document.getElementById('studentProfileForm');
        let initialCollegeEmail = '';

        // UI Helpers
        const collegeEmailInput = document.getElementById('collegeEmail');
        const inlineOtpGroup = document.getElementById('inlineOtpGroup');
        const inlineOtpInput = document.getElementById('inlineOtp');
        const inlineVerifyBtn = document.getElementById('inlineVerifyBtn');

        // LOAD PROFILE FROM SERVER
        async function loadProfile() {
            try {
                const response = await AuthGuard.secureFetch('/api/student/profile/get', {
                    headers: {  }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error);
                
                const u = data.user;
                document.getElementById('name').value = u.full_name || '';
                document.getElementById('profileNameDisplay').textContent = u.full_name || 'Student';
                document.getElementById('email').value = u.email || '';
                document.getElementById('collegeEmail').value = u.college_email || '';
                document.getElementById('phone').value = u.phone_number || '';
                document.getElementById('regNo').value = u.reg_no || 'N/A';
                document.getElementById('dept').value = u.department || '';
                document.getElementById('dob').value = u.dob || '';
                document.getElementById('address').value = u.address || '';
                document.getElementById('gender').value = u.gender || '';
                
                initialCollegeEmail = u.college_email || '';
            } catch (error) {
                console.error("Load failed:", error);
                if (error.message.includes('token') || error.message.includes('401')) {
                    alert("Session expired. Please log in again.");
                    AuthGuard.logout();
                }
            }
        }

        loadProfile();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentCollegeEmail = document.getElementById('collegeEmail').value;
            
            // 1. Basic Validation: If changed and not showing OTP, trigger sendOtp
            if (currentCollegeEmail && currentCollegeEmail !== initialCollegeEmail && inlineOtpGroup.classList.contains('hidden')) {
                await sendOtp(currentCollegeEmail);
                return;
            }

            // 2. Save Basic Info
            try {
                const basicRes = await AuthGuard.secureFetch('/api/student/profile/update', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                         
                    },
                    body: JSON.stringify({
                        full_name: document.getElementById('name').value,
                        phone_number: document.getElementById('phone').value,
                        department: document.getElementById('dept').value,
                        dob: document.getElementById('dob').value,
                        address: document.getElementById('address').value,
                        gender: document.getElementById('gender').value
                    })
                });
                
                if (!basicRes.ok) throw new Error("Failed to update basic info");
                alert('Profile updated successfully!');
                window.location.reload();
            } catch (err) {
                alert("Save Error: " + err.message);
            }
        });

        async function sendOtp(email) {
            try {
                const btn = document.querySelector('button[type="submit"]');
                btn.innerHTML = "..."; 
                
                const res = await AuthGuard.secureFetch('/api/student/profile/send-college-email-otp', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                         
                    },
                    body: JSON.stringify({ college_email: email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                // Success: Show inline card OTP input
                inlineOtpGroup.classList.remove('hidden');
                lucide.createIcons();
                collegeEmailInput.disabled = true;
                btn.innerHTML = "OTP SENT. Verify above first.";
                btn.disabled = true;
                
            } catch (err) {
                alert("OTP Send Error: " + err.message);
                document.querySelector('button[type="submit"]').innerHTML = "Save Profile Changes";
            }
        }

        inlineVerifyBtn.addEventListener('click', async () => {
            const otp = inlineOtpInput.value;
            const email = collegeEmailInput.value;
            
            try {
                inlineVerifyBtn.innerHTML = "Ok...";
                inlineVerifyBtn.disabled = true;
                
                const res = await AuthGuard.secureFetch('/api/student/profile/verify-college-email', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                         
                    },
                    body: JSON.stringify({ email, otp })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                
                alert("College email verified successfully!");
                inlineOtpGroup.classList.add('hidden');
                collegeEmailInput.disabled = false;
                initialCollegeEmail = email; // Update state
                window.location.reload();
            } catch (err) {
                alert(err.message);
                inlineVerifyBtn.innerHTML = "Verify";
                inlineVerifyBtn.disabled = false;
            }
        });

        function cancelEmailChange() {
            collegeEmailInput.value = initialCollegeEmail;
            collegeEmailInput.disabled = false;
            inlineOtpGroup.classList.add('hidden');
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Save Profile Changes";
        }

        async function initiatePasswordChange() {
            const btn = document.getElementById('initPasswordChangeBtn');
            btn.innerHTML = "Sending OTP...";
            btn.disabled = true;

            try {
                const res = await AuthGuard.secureFetch('/api/profile/send-password-otp', {
                    method: 'POST'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                document.getElementById('passwordChangeForm').classList.remove('hidden');
                btn.innerHTML = "OTP Sent to Primary Email";
            } catch (err) {
                alert("Failed to initiate password change: " + err.message);
                btn.innerHTML = "Change Password";
                btn.disabled = false;
            }
        }

        async function confirmPasswordChange() {
            const otp = document.getElementById('pwdOtp').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!otp || !newPassword) {
                alert("Both OTP and new password are required.");
                return;
            }

            const btn = document.getElementById('confirmPasswordChangeBtn');
            btn.innerHTML = "Updating...";
            btn.disabled = true;

            try {
                const res = await AuthGuard.secureFetch('/api/profile/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp, new_password: newPassword })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                alert("Password updated successfully! Please log in with your new password.");
                AuthGuard.logout(); // Force re-login with new credentials
            } catch (err) {
                alert("Password update failed: " + err.message);
                btn.innerHTML = "Update Password";
                btn.disabled = false;
            }
        }

        function cancelPasswordChange() {
            document.getElementById('passwordChangeForm').classList.add('hidden');
            document.getElementById('pwdOtp').value = '';
            document.getElementById('newPassword').value = '';
            const btn = document.getElementById('initPasswordChangeBtn');
            btn.innerHTML = "Change Password";
            btn.disabled = false;
        }
    </script>
</body>
</html>
